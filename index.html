<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wp.047 — Creative Portfolio</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500&family=Space+Mono:wght@400&display=swap" rel="stylesheet">

  <style>
    /* 🎨 1. ตั้งค่าสีและตัวแปรหลัก (แก้ตรงนี้เพื่อเปลี่ยนธีม) */
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #222222;
      --text: #f0ede8;
      --muted: #666;
      --accent: #e8d5b0; /* สีทองหลัก */
      --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow-x: hidden; line-height: 1.5; }

    /* ── HEADER ── */
    header {
      position: sticky; top: 0; z-index: 100; height: 60px; padding: 0 32px;
      background: rgba(10,10,10,0.85); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 4px; color: var(--accent); text-decoration: none; }
    .count-badge { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); border: 1px solid var(--border); padding: 4px 12px; border-radius: 20px; }

    /* ── FILTER SECTION (ส่วนปุ่มกด) ── */
    .filter-section { padding: 24px 32px 12px; position: sticky; top: 60px; z-index: 90; background: var(--bg); border-bottom: 1px solid var(--border); }
    .filter-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .filter-label { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); min-width: 70px; }
    .filter-pills { display: flex; gap: 8px; flex-wrap: wrap; }
    
    .pill { 
      padding: 6px 16px; border-radius: 100px; border: 1px solid var(--border); 
      background: transparent; color: var(--muted); font-size: 11px; cursor: pointer; 
      transition: var(--transition); text-transform: uppercase;
    }
    .pill:hover { border-color: #555; color: var(--text); }
    .pill.active { background: var(--text); color: #000; border-color: var(--text); }

    /* ── GRID & CARDS (ส่วนแสดงผลงาน) ── */
    .grid-container { 
      padding: 32px; display: grid; gap: 16px;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
    }
    
    .card { 
      background: var(--surface); border-radius: 12px; overflow: hidden;
      cursor: pointer; transition: var(--transition); opacity: 1; transform: scale(1);
    }
    .card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
    .card.hidden { opacity: 0; transform: scale(0.9); pointer-events: none; position: absolute; visibility: hidden; }

    /* จัดสัดส่วนภาพหน้าปก */
    .card-thumb { width: 100%; aspect-ratio: 3/4; overflow: hidden; background: #1a1a1a; }
    .card.is-video .card-thumb { aspect-ratio: 16/10; } /* ถ้าเป็นวิดีโอให้เป็นแนวนอน */
    .card-thumb img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.8s ease; }
    .card:hover .card-thumb img { transform: scale(1.1); }

    .card-body { padding: 16px; }
    .card-title { font-size: 13px; font-weight: 500; margin-bottom: 10px; }
    .tag { font-size: 8px; padding: 3px 8px; border-radius: 100px; background: rgba(255,255,255,0.05); color: var(--muted); text-transform: uppercase; margin-right: 4px; }

    /* ── MODAL (หน้าจอแสดงผลงาน) ── */
    .modal { 
      position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; 
      display: none; align-items: center; justify-content: center; padding: 40px; 
      opacity: 0; transition: opacity 0.4s ease; 
    }
    .modal.active { display: flex; opacity: 1; }
    .modal-close { position: fixed; top: 30px; right: 40px; font-size: 32px; color: white; cursor: pointer; }
    .modal-content { max-width: 1000px; width: 100%; max-height: 85vh; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
    .modal-content img { width: 100%; border-radius: 8px; }
    .video-container { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 8px; overflow: hidden; background: #000; }
    .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

    /* ── CONTACT (ส่วนท้าย) ── */
    .contact-footer { padding: 100px 32px; background: var(--surface); text-align: center; }
    .contact-footer h2 { font-family: 'Bebas Neue', sans-serif; font-size: 48px; letter-spacing: 6px; margin-bottom: 30px; color: var(--accent); }
    .contact-links { display: flex; justify-content: center; gap: 40px; flex-wrap: wrap; }
    .contact-item { color: var(--text); text-decoration: none; font-size: 13px; }
    .contact-item span { color: var(--muted); display: block; font-size: 9px; margin-bottom: 4px; letter-spacing: 2px; }
  </style>
</head>
<body>

  <header>
    <a href="#" class="logo">wp.047</a>
    <div class="count-badge"><span id="visibleCount">0</span> PROJECTS</div>
  </header>

  <div class="filter-section">
    <div class="filter-row">
      <div class="filter-label">ROLE</div>
      <div class="filter-pills" id="roleFilters">
        <button class="pill active" data-group="role" data-value="all">All Roles</button>
        <button class="pill" data-group="role" data-value="Photographer">Photographer</button>
        <button class="pill" data-group="role" data-value="Director">Director</button>
        <button class="pill" data-group="role" data-value="Colorist">Colorist</button>
      </div>
    </div>
    <div class="filter-row">
      <div class="filter-label">TYPE</div>
      <div class="filter-pills" id="typeFilters">
        <button class="pill active" data-group="type" data-value="all">All Types</button>
        <button class="pill" data-group="type" data-value="Product Photography">Product Photography</button>
        <button class="pill" data-group="type" data-value="Music Video">Music Video</button>
      </div>
    </div>
  </div>

  <div class="grid-container" id="grid"></div>

  <div class="modal" id="projectModal">
    <span class="modal-close" onclick="closeModal()">&times;</span>
    <div class="modal-content" id="modalContent"></div>
  </div>

  <section class="contact-footer">
    <h2>GET IN TOUCH</h2>
    <div class="contact-links">
      <a href="mailto:witsanu.047@gmail.com" class="contact-item"><span>EMAIL</span>witsanu.047@gmail.com</a>
      <a href="https://www.instagram.com/wp.047/?hl=th" target="_blank" class="contact-item"><span>INSTAGRAM</span>@wp.047</a>
    </div>
  </section>

  <script>
    /* 📁 [DATABASE] ส่วนจัดการข้อมูลโปรเจกต์ (เพิ่มงานใหม่ตรงนี้) */
    const projects = [
      { 
        id: 1, 
        title: "HAAB 2025 Wrapped Collection", 
        roles: ["Photographer"], 
        type: "Product Photography", 
        folder: "HAAB-2025-wrapped-collection", 
        totalImages: 4 
      },
      { 
        id: 2, 
        title: "HAAB Meovv", 
        roles: ["Photographer"], 
        type: "Product Photography", 
        folder: "HAAB-Meovv", 
        totalImages: 4 
      },
      { 
        id: 3, 
        title: "CALLADAY - Meant to Be", 
        roles: ["Director", "Colorist"], 
        type: "Music Video", 
        youtubeID: "J3WRBmX2RV0" 
      }
    ];

    /* ⚙️ ส่วนจัดการสถานะ (State) */
    let selectedRoles = ["all"];
    let selectedTypes = ["all"];

    /* 🛠️ [FUNCTION] สร้างการ์ดผลงานลงในหน้าเว็บ */
    function renderCards() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';

      projects.forEach(p => {
        const card = document.createElement('div');
        const isVideo = p.youtubeID ? 'is-video' : '';
        card.className = `card ${isVideo}`;
        card.setAttribute('data-roles', p.roles.join(','));
        card.setAttribute('data-type', p.type);
        card.onclick = () => openProject(p);
        
        // เลือกรูปหน้าปก (จาก YouTube หรือโฟลเดอร์)
        const coverSrc = p.youtubeID 
          ? `https://img.youtube.com/vi/${p.youtubeID}/maxresdefault.jpg` 
          : `images/${p.folder}/01.jpg`;

        card.innerHTML = `
          <div class="card-thumb">
            <img src="${coverSrc}" alt="${p.title}" onerror="this.src='https://img.youtube.com/vi/${p.youtubeID}/hqdefault.jpg'">
          </div>
          <div class="card-body">
            <div class="card-title">${p.title}</div>
            <div class="tag-container">
              ${p.roles.map(r => `<span class="tag">${r}</span>`).join('')}
              <span class="tag">${p.type}</span>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });
      updateFilterUI();
    }

    /* 🛠️ [FUNCTION] ระบบกรองข้อมูล (Filter Logic) */
    function handlePillClick(pill) {
      const { group, value } = pill.dataset;
      let targetArray = (group === 'role') ? selectedRoles : selectedTypes;

      if (value === 'all') {
        targetArray.splice(0, targetArray.length, 'all');
      } else {
        const allIdx = targetArray.indexOf('all');
        if (allIdx > -1) targetArray.splice(allIdx, 1);

        const valIdx = targetArray.indexOf(value);
        (valIdx > -1) ? targetArray.splice(valIdx, 1) : targetArray.push(value);

        if (targetArray.length === 0) targetArray.push('all');
      }

      // อัปเดตสีปุ่ม
      document.querySelectorAll(`.pill[data-group="${group}"]`).forEach(p => {
        p.classList.toggle('active', targetArray.includes(p.dataset.value));
      });

      updateFilterUI();
    }

    function updateFilterUI() {
      const cards = document.querySelectorAll('.card');
      let count = 0;

      cards.forEach(card => {
        const cardRoles = card.dataset.roles.split(',');
        const cardType = card.dataset.type;

        const roleMatch = selectedRoles.includes('all') || cardRoles.some(r => selectedRoles.includes(r));
        const typeMatch = selectedTypes.includes('all') || selectedTypes.includes(cardType);

        if (roleMatch && typeMatch) {
          card.classList.remove('hidden');
          count++;
        } else {
          card.classList.add('hidden');
        }
      });
      document.getElementById('visibleCount').textContent = count;
    }

    /* 🛠️ [FUNCTION] ระบบเปิด/ปิด Modal */
    function openProject(p) {
      const modal = document.getElementById('projectModal');
      const content = document.getElementById('modalContent');
      content.innerHTML = p.youtubeID 
        ? `<div class="video-container"><iframe src="https://www.youtube.com/embed/${p.youtubeID}?autoplay=1" allow="autoplay; encrypted-media" allowfullscreen></iframe></div>`
        : Array.from({length: p.totalImages}, (_, i) => `<img src="images/${p.folder}/${(i+1).toString().padStart(2, '0')}.jpg">`).join('');
      
      modal.style.display = 'flex';
      setTimeout(() => modal.classList.add('active'), 10);
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      const modal = document.getElementById('projectModal');
      modal.classList.remove('active');
      setTimeout(() => {
        modal.style.display = 'none';
        document.getElementById('modalContent').innerHTML = '';
      }, 400);
      document.body.style.overflow = 'auto';
    }

    /* 🚀 เริ่มต้นทำงาน */
    document.querySelectorAll('.pill').forEach(pill => pill.onclick = () => handlePillClick(pill));
    window.onload = renderCards;
  </script>
</body>
</html>
