<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wp.047 — Creative Portfolio</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500&family=Space+Mono:wght@400&display=swap" rel="stylesheet">

  <style>
    /* 🎨 1. VARIABLE: ส่วนตั้งค่าหลัก (สี, ระยะห่าง, ความเร็ว) */
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #222222;
      --text: #f0ede8;
      --muted: #666;
      --accent: #e8d5b0;
      --speed: 0.3s; /* ความเร็วของ Motion (ปรับให้เร็วขึ้นเพื่อความ Minimal) */
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; -webkit-font-smoothing: antialiased; }

    /* ── HEADER ── */
    header {
      position: sticky; top: 0; z-index: 100; height: 60px; padding: 0 32px;
      background: rgba(10,10,10,0.8); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 3px; color: var(--accent); text-decoration: none; }
    .count-badge { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); border: 1px solid var(--border); padding: 4px 12px; border-radius: 20px; }

    /* ── FILTER: ส่วนปุ่มกด (Minimal Style) ── */
    .filter-section { padding: 24px 32px 12px; position: sticky; top: 60px; z-index: 90; background: var(--bg); border-bottom: 1px solid var(--border); }
    .filter-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .filter-label { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--muted); min-width: 60px; letter-spacing: 1px; }
    
    .pill { 
      padding: 6px 14px; border-radius: 4px; border: 1px solid var(--border); 
      background: transparent; color: var(--muted); font-size: 11px; cursor: pointer; 
      transition: all var(--speed); text-transform: uppercase;
    }
    .pill:hover { color: var(--text); border-color: #444; }
    .pill.active { background: var(--text); color: #000; border-color: var(--text); }

    /* ── GRID: การแสดงผลการ์ด ── */
    .grid-container { 
      padding: 32px; display: grid; gap: 20px;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
    }
    
    .card { 
      background: var(--surface); border-radius: 8px; overflow: hidden;
      cursor: pointer; transition: opacity var(--speed), transform var(--speed);
      opacity: 1;
    }
    .card:hover { opacity: 0.85; } /* Minimal hover แค่จางลงเล็กน้อย */
    .card.hidden { opacity: 0; pointer-events: none; position: absolute; visibility: hidden; }

    /* ปรับสัดส่วนภาพหน้าปก */
    .card-thumb { width: 100%; aspect-ratio: 3/4; overflow: hidden; background: #151515; }
    .card.is-video .card-thumb { aspect-ratio: 16/10; } 
    .card-thumb img { width: 100%; height: 100%; object-fit: cover; }

    .card-body { padding: 16px; }
    .card-title { font-size: 13px; font-weight: 500; margin-bottom: 8px; letter-spacing: 0.5px; }
    .tag { font-size: 8px; padding: 2px 6px; border-radius: 2px; background: rgba(255,255,255,0.05); color: var(--muted); text-transform: uppercase; margin-right: 4px; }

    /* ── MODAL: หน้าจอวิดีโอ/รูปภาพ (Centered & Sized) ── */
    .modal { 
      position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; 
      display: none; align-items: center; justify-content: center; padding: 40px; 
      opacity: 0; transition: opacity var(--speed);
    }
    .modal.active { display: flex; opacity: 1; }
    .modal-close { position: fixed; top: 25px; right: 30px; font-size: 28px; color: white; cursor: pointer; z-index: 1010; }
    
    .modal-content { 
      max-width: 900px; width: 100%; /* จำกัดขนาดวิดีโอไม่ให้ใหญ่เกินไป */
      display: flex; flex-direction: column; gap: 20px; 
    }
    .modal-content img { width: 100%; border-radius: 4px; }
    
    .video-container { position: relative; padding-bottom: 56.25%; height: 0; background: #000; border-radius: 4px; overflow: hidden; }
    .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

    /* ── CONTACT ── */
    .contact-footer { padding: 100px 32px; text-align: center; border-top: 1px solid var(--border); }
    .contact-footer h2 { font-family: 'Bebas Neue', sans-serif; font-size: 40px; letter-spacing: 5px; margin-bottom: 30px; color: var(--accent); }
    .contact-links { display: flex; justify-content: center; gap: 40px; flex-wrap: wrap; }
    .contact-item { color: var(--text); text-decoration: none; font-size: 12px; letter-spacing: 1px; }
    .contact-item span { color: var(--muted); display: block; font-size: 8px; margin-bottom: 4px; letter-spacing: 2px; }
  </style>
</head>
<body>

  <header>
    <a href="#" class="logo">wp.047</a>
    <div class="count-badge"><span id="visibleCount">0</span> PROJECTS</div>
  </header>

  <div class="filter-section">
    <div class="filter-row">
      <div class="filter-label">ROLE</div>
      <div class="filter-pills" id="roleFilters">
        <button class="pill active" data-group="role" data-value="all">All</button>
        <button class="pill" data-group="role" data-value="Photographer">Photographer</button>
        <button class="pill" data-group="role" data-value="Director">Director</button>
        <button class="pill" data-group="role" data-value="Colorist">Colorist</button>
      </div>
    </div>
    <div class="filter-row">
      <div class="filter-label">TYPE</div>
      <div class="filter-pills" id="typeFilters">
        <button class="pill active" data-group="type" data-value="all">All</button>
        <button class="pill" data-group="type" data-value="Product Photography">Product Photography</button>
        <button class="pill" data-group="type" data-value="Music Video">Music Video</button>
      </div>
    </div>
  </div>

  <div class="grid-container" id="grid"></div>

  <div class="modal" id="projectModal">
    <span class="modal-close" onclick="closeModal()">&times;</span>
    <div class="modal-content" id="modalContent"></div>
  </div>

  <section class="contact-footer">
    <h2>GET IN TOUCH</h2>
    <div class="contact-links">
      <a href="mailto:witsanu.047@gmail.com" class="contact-item"><span>EMAIL</span>witsanu.047@gmail.com</a>
      <a href="https://www.instagram.com/wp.047/?hl=th" target="_blank" class="contact-item"><span>INSTAGRAM</span>@wp.047</a>
    </div>
  </section>

  <script>
    /* 📁 [DATABASE]: เพิ่ม/แก้ไขข้อมูลงานตรงนี้ */
    const projects = [
      { 
        id: 1, 
        title: "HAAB 2025 Wrapped Collection", 
        roles: ["Photographer"], 
        type: "Product Photography", 
        folder: "HAAB-2025-wrapped-collection", 
        totalImages: 4 
      },
      { 
        id: 2, 
        title: "HAAB Meovv", 
        roles: ["Photographer"], 
        type: "Product Photography", 
        folder: "HAAB-Meovv", 
        totalImages: 4 
      },
      { 
        id: 3, 
        title: "CALLADAY - Meant to Be", 
        roles: ["Director", "Colorist"], 
        type: "Music Video", 
        youtubeID: "J3WRBmX2RV0" 
      }
    ];

    /* ⚙️ [SYSTEM]: ส่วนจัดการระบบ (แนะนำให้ปล่อยไว้หากไม่ต้องการแก้ Logic) */
    let selectedRoles = ["all"];
    let selectedTypes = ["all"];

    function renderCards() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';

      projects.forEach(p => {
        const card = document.createElement('div');
        card.className = `card ${p.youtubeID ? 'is-video' : ''}`;
        card.setAttribute('data-roles', p.roles.join(','));
        card.setAttribute('data-type', p.type);
        card.onclick = () => openProject(p);
        
        const coverSrc = p.youtubeID 
          ? `https://img.youtube.com/vi/${p.youtubeID}/maxresdefault.jpg` 
          : `images/${p.folder}/01.jpg`;

        card.innerHTML = `
          <div class="card-thumb">
            <img src="${coverSrc}" alt="${p.title}" onerror="this.src='https://img.youtube.com/vi/${p.youtubeID}/hqdefault.jpg'">
          </div>
          <div class="card-body">
            <div class="card-title">${p.title}</div>
            <div>
              ${p.roles.map(r => `<span class="tag">${r}</span>`).join('')}
              <span class="tag">${p.type}</span>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });
      updateUI();
    }

    function handlePillClick(pill) {
      const { group, value } = pill.dataset;
      let target = (group === 'role') ? selectedRoles : selectedTypes;

      if (value === 'all') {
        target.splice(0, target.length, 'all');
      } else {
        const allIdx = target.indexOf('all');
        if (allIdx > -1) target.splice(allIdx, 1);
        const valIdx = target.indexOf(value);
        (valIdx > -1) ? target.splice(valIdx, 1) : target.push(value);
        if (target.length === 0) target.push('all');
      }

      document.querySelectorAll(`.pill[data-group="${group}"]`).forEach(p => {
        p.classList.toggle('active', target.includes(p.dataset.value));
      });
      updateUI();
    }

    function updateUI() {
      const cards = document.querySelectorAll('.card');
      let count = 0;
      cards.forEach(card => {
        const roles = card.dataset.roles.split(',');
        const type = card.dataset.type;
        const roleMatch = selectedRoles.includes('all') || roles.some(r => selectedRoles.includes(r));
        const typeMatch = selectedTypes.includes('all') || selectedTypes.includes(type);
        const isVisible = roleMatch && typeMatch;
        card.classList.toggle('hidden', !isVisible);
        if (isVisible) count++;
      });
      document.getElementById('visibleCount').textContent = count;
    }

    function openProject(p) {
      const modal = document.getElementById('projectModal');
      const content = document.getElementById('modalContent');
      content.innerHTML = p.youtubeID 
        ? `<div class="video-container"><iframe src="https://www.youtube.com/embed/${p.youtubeID}?autoplay=1" allowfullscreen></iframe></div>`
        : Array.from({length: p.totalImages}, (_, i) => `<img src="images/${p.folder}/${(i+1).toString().padStart(2, '0')}.jpg">`).join('');
      
      modal.style.display = 'flex';
      setTimeout(() => modal.classList.add('active'), 10);
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      const modal = document.getElementById('projectModal');
      modal.classList.remove('active');
      setTimeout(() => {
        modal.style.display = 'none';
        document.getElementById('modalContent').innerHTML = '';
      }, 300);
      document.body.style.overflow = 'auto';
    }

    document.querySelectorAll('.pill').forEach(pill => pill.onclick = () => handlePillClick(pill));
    window.onload = renderCards;
  </script>
</body>
</html>
