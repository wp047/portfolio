<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wp.047 — Creative Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #222222;
    --text: #f0ede8;
    --muted: #666;
    --accent: #e8d5b0;
    --pill-active-type: #a8d5a2;
    --gap: 14px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; scroll-behavior: smooth; overflow-x: hidden; }

  /* ── HEADER ── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,10,10,0.92); backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 32px; height: 60px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 4px; color: var(--accent); text-decoration: none; }
  nav { display: flex; gap: 24px; }
  nav a { color: var(--muted); text-decoration: none; font-size: 13px; letter-spacing: 1px; transition: color .2s; }
  nav a:hover { color: var(--text); }
  .count-badge { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); border: 1px solid var(--border); padding: 4px 10px; border-radius: 20px; }

  /* ── FILTER SECTION ── */
  .filter-section { padding: 20px 32px 16px; background: var(--bg); position: sticky; top: 60px; z-index: 90; border-bottom: 1px solid var(--border); }
  .filter-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
  .filter-label { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); min-width: 80px; }
  .filter-pills { display: flex; gap: 7px; flex-wrap: wrap; }
  .pill { padding: 6px 14px; border-radius: 100px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 12px; cursor: pointer; transition: all .2s; }
  
  /* สีปุ่มเวลา Active */
  .pill.active-role { background: var(--accent) !important; color: #0a0a0a !important; border-color: var(--accent) !important; font-weight: 600; }
  .pill.active-type { background: var(--pill-active-type) !important; color: #0a0a0a !important; border-color: var(--pill-active-type) !important; font-weight: 600; }

  /* ── GRID ── */
  .grid-container { padding: 28px 32px 60px; columns: 5; column-gap: var(--gap); }
  @media (max-width: 1100px) { .grid-container { columns: 3; } }
  @media (max-width: 768px) { .grid-container { columns: 2; padding: 16px; } nav { display: none; } }

  .card { break-inside: avoid; margin-bottom: var(--gap); border-radius: 12px; overflow: hidden; background: var(--surface); cursor: pointer; position: relative; transition: transform .25s ease; border: 1px solid transparent; display: block; }
  .card:hover { transform: translateY(-4px); border-color: #333; }
  
  /* CSS สำหรับซ่อนการ์ด */
  .card.hidden { display: none !important; }

  .card-thumb { width: 100%; position: relative; overflow: hidden; background: #1a1a1a; }
  .card-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .5s ease; }
  .card:hover .card-thumb img { transform: scale(1.05); }
  .card-body { padding: 12px; }
  .card-title { font-size: 13px; font-weight: 500; margin-bottom: 8px; }
  .tag { font-size: 9px; padding: 2px 8px; border-radius: 100px; border: 1px solid rgba(255,255,255,0.1); color: var(--muted); text-transform: uppercase; margin-right: 4px; }

  /* ── MODAL ── */
  .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: none; flex-direction: column; align-items: center; padding: 60px 20px; overflow-y: auto; }
  .modal.active { display: flex; }
  .modal-close { position: fixed; top: 20px; right: 30px; font-size: 30px; color: white; cursor: pointer; z-index: 1001; }
  .modal-content { max-width: 900px; width: 100%; display: flex; flex-direction: column; gap: 20px; margin: auto 0; }
  .modal-content img { width: 100%; border-radius: 4px; }
  .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; background: #000; border-radius: 8px; }
  .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

  /* ── CONTACT ── */
  .contact-footer { padding: 80px 32px; background: var(--surface); border-top: 1px solid var(--border); text-align: center; }
  .contact-footer h2 { font-family: 'Bebas Neue', sans-serif; font-size: 40px; letter-spacing: 4px; margin-bottom: 20px; color: var(--accent); }
  .contact-links { display: flex; justify-content: center; gap: 40px; flex-wrap: wrap; }
  .contact-item { color: var(--text); text-decoration: none; font-family: 'Space Mono', monospace; font-size: 14px; transition: opacity 0.2s; }
  .contact-item:hover { opacity: 0.7; }
  .contact-item span { color: var(--muted); display: block; font-size: 10px; margin-bottom: 4px; }
</style>
</head>
<body>

<header>
  <a href="#" class="logo">wp.047</a>
  <nav><a href="#work">Work</a><a href="#contact">Contact</a></nav>
  <div class="header-actions">
    <div class="count-badge"><span id="visibleCount">0</span> projects</div>
  </div>
</header>

<div class="filter-section" id="work">
  <div class="filter-row">
    <div class="filter-label">ROLE</div>
    <div class="filter-pills" id="roleFilters">
      <button class="pill active-role" data-group="role" data-value="all">All</button>
      <button class="pill" data-group="role" data-value="Photographer">Photographer</button>
      <button class="pill" data-group="role" data-value="Director">Director</button>
      <button class="pill" data-group="role" data-value="Colorist">Colorist</button>
    </div>
  </div>
  <div class="filter-row">
    <div class="filter-label">TYPE</div>
    <div class="filter-pills" id="typeFilters">
      <button class="pill active-type" data-group="type" data-value="all">All</button>
      <button class="pill" data-group="type" data-value="Product Photography">Product Photography</button>
      <button class="pill" data-group="type" data-value="Music Video">Music Video</button>
    </div>
  </div>
</div>

<div class="grid-container" id="grid"></div>

<div class="modal" id="projectModal">
  <span class="modal-close" onclick="closeModal()">&times;</span>
  <div class="modal-content" id="modalContent"></div>
</div>

<section class="contact-footer" id="contact">
  <h2>GET IN TOUCH</h2>
  <div class="contact-links">
    <a href="mailto:witsanu.047@gmail.com" class="contact-item"><span>EMAIL</span>witsanu.047@gmail.com</a>
    <a href="https://www.instagram.com/wp.047/?hl=th" target="_blank" class="contact-item"><span>INSTAGRAM</span>@wp.047</a>
  </div>
</section>

<script>
// ── DATA ──
const projects = [
  {
    id: 1, title: "HAAB 2025 Wrapped Collection",
    role: "Photographer", type: "Product Photography",
    folder: "HAAB-2025-wrapped-collection", totalImages: 4, h: 480 
  },
  {
    id: 2, title: "HAAB Meovv",
    role: "Photographer", type: "Product Photography",
    folder: "HAAB-Meovv", totalImages: 4, h: 480
  },
  {
    id: 3, title: "CALLADAY - Meant to Be (Official MV)",
    role: "Director, Colorist", type: "Music Video",
    youtubeID: "J3WRBmX2RV0", h: 300
  }
];

let activeRole = "all";
let activeType = "all";

function renderCards() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  projects.forEach((p) => {
    const card = document.createElement('div');
    card.className = 'card';
    // เก็บค่า Role และ Type ไว้ใน Dataset เพื่อใช้กรอง
    card.setAttribute('data-role', p.role);
    card.setAttribute('data-type', p.type);
    card.onclick = () => openProject(p);
    
    const coverSrc = p.youtubeID 
      ? `https://img.youtube.com/vi/${p.youtubeID}/maxresdefault.jpg` 
      : `images/${p.folder}/01.jpg`;

    card.innerHTML = `
      <div class="card-thumb" style="height:${p.h}px">
        <img src="${coverSrc}" alt="${p.title}" onerror="this.src='https://img.youtube.com/vi/${p.youtubeID}/hqdefault.jpg'">
      </div>
      <div class="card-body">
        <div class="card-title">${p.title}</div>
        <div style="display:flex; gap:5px;"><span class="tag">${p.role}</span><span class="tag">${p.type}</span></div>
      </div>
    `;
    grid.appendChild(card);
  });
  applyFilter(); // กรองครั้งแรกเมื่อโหลดเสร็จ
}

function applyFilter() {
  const cards = document.querySelectorAll('.card');
  let visible = 0;

  cards.forEach(card => {
    const cardRole = card.getAttribute('data-role');
    const cardType = card.getAttribute('data-type');

    // ตรรกะการกรอง: ต้องตรงทั้ง Role และ Type (ถ้าไม่ได้เลือก All)
    const roleMatch = (activeRole === "all") || cardRole.includes(activeRole);
    const typeMatch = (activeType === "all") || cardType.includes(activeType);

    if (roleMatch && typeMatch) {
      card.classList.remove('hidden');
      visible++;
    } else {
      card.classList.add('hidden');
    }
  });

  document.getElementById('visibleCount').textContent = visible;
}

// ผูกเหตุการณ์คลิกให้ปุ่ม Pill ทั้งหมด
document.querySelectorAll('.pill').forEach(pill => {
  pill.addEventListener('click', function() {
    const group = this.getAttribute('data-group');
    const value = this.getAttribute('data-value');

    if (group === 'role') {
      activeRole = value;
      // ลบ Class Active เก่าออกและใส่ให้ปุ่มที่เพิ่งกด
      document.querySelectorAll('#roleFilters .pill').forEach(p => p.classList.remove('active-role'));
      this.classList.add('active-role');
    } else {
      activeType = value;
      document.querySelectorAll('#typeFilters .pill').forEach(p => p.classList.remove('active-type'));
      this.classList.add('active-type');
    }

    applyFilter(); // เรียกใช้ฟังก์ชันกรองทันที
  });
});

function openProject(p) {
  const modal = document.getElementById('projectModal');
  const content = document.getElementById('modalContent');
  content.innerHTML = '';

  if (p.youtubeID) {
    content.innerHTML = `
      <div class="video-container">
        <iframe src="https://www.youtube.com/embed/${p.youtubeID}?autoplay=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>
      </div>
      <h3 style="text-align:center; font-family:'Bebas Neue'; letter-spacing:2px; margin-top:20px; color:var(--accent);">${p.title}</h3>
    `;
  } else {
    for (let i = 1; i <= p.totalImages; i++) {
      const imgNum = i.toString().padStart(2, '0');
      const img = document.createElement('img');
      img.src = `images/${p.folder}/${imgNum}.jpg`;
      content.appendChild(img);
    }
  }
  modal.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  const modal = document.getElementById('projectModal');
  document.getElementById('modalContent').innerHTML = ''; 
  modal.classList.remove('active');
  document.body.style.overflow = 'auto';
}

// รันฟังก์ชันสร้างการ์ดเมื่อหน้าเว็บโหลดเสร็จ
window.addEventListener('DOMContentLoaded', renderCards);
</script>
</body>
</html>
