<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wp.047 — Creative Portfolio</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500&family=Space+Mono:wght@400&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #222222;
      --text: #f0ede8;
      --muted: #666;
      --accent: #e8d5b0;
      --speed: 0.3s; 
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }

    /* ── HEADER ── */
    header {
      position: sticky; top: 0; z-index: 100; height: 60px; padding: 0 32px;
      background: rgba(10,10,10,0.85); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 3px; color: var(--accent); text-decoration: none; }
    
    /* เมนู Work & Contact */
    nav { display: flex; gap: 24px; }
    nav a { color: var(--muted); text-decoration: none; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; transition: var(--speed); }
    nav a:hover { color: var(--text); }

    /* ── FILTER SECTION (ID: work) ── */
    .filter-section { padding: 24px 32px 12px; position: sticky; top: 60px; z-index: 90; background: var(--bg); border-bottom: 1px solid var(--border); }
    .filter-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .filter-label { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--muted); min-width: 60px; }
    .pill { padding: 6px 14px; border-radius: 4px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 11px; cursor: pointer; transition: all var(--speed); text-transform: uppercase; }
    .pill.active { background: var(--text); color: #000; border-color: var(--text); }

    /* ── GRID ── */
    .grid-container { 
      padding: 32px; display: grid; gap: 24px;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
      align-items: start;
    }
    .card { background: var(--surface); border-radius: 12px; overflow: hidden; cursor: pointer; transition: opacity var(--speed); display: flex; flex-direction: column; }
    .card:hover { opacity: 0.7; } 
    .card-thumb { width: 100%; aspect-ratio: 3/4; overflow: hidden; background: #151515; }
    .card.is-video .card-thumb { aspect-ratio: 16/9; } 
    .card-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .card-body { padding: 20px; }
    .card-title { font-size: 15px; font-weight: 500; margin-bottom: 12px; }
    .tag { font-size: 9px; padding: 3px 8px; border-radius: 4px; background: rgba(255,255,255,0.06); color: var(--muted); text-transform: uppercase; margin-right: 6px; }

    /* ── MODAL (เลื่อนดูรูปได้) ── */
    .modal { 
      position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; 
      display: none; justify-content: center; overflow-y: auto; padding: 60px 20px; 
      opacity: 0; transition: opacity var(--speed);
    }
    .modal.active { display: flex; opacity: 1; }
    .modal-close { position: fixed; top: 20px; right: 30px; font-size: 32px; color: white; cursor: pointer; z-index: 1010; }
    .modal-content { width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 15px; height: fit-content; margin: auto; }
    .modal-content img { width: 100%; border-radius: 4px; display: block; }
    .video-container { position: relative; width: 100%; padding-bottom: 56.25%; background: #000; border-radius: 4px; overflow: hidden; }
    .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

    /* ── CONTACT (ID: contact) ── */
    .contact-footer { padding: 120px 32px; text-align: center; border-top: 1px solid var(--border); }
    .contact-footer h2 { font-family: 'Bebas Neue', sans-serif; font-size: 40px; letter-spacing: 5px; margin-bottom: 30px; color: var(--accent); }
    .contact-links { display: flex; justify-content: center; gap: 40px; flex-wrap: wrap; }
    .contact-item { color: var(--text); text-decoration: none; font-size: 12px; }
    .contact-item span { color: var(--muted); display: block; font-size: 8px; margin-bottom: 4px; letter-spacing: 2px; }
  </style>
</head>
<body>

  <header>
    <a href="#" class="logo">wp.047</a>
    <nav>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <div class="filter-section" id="work">
    <div class="filter-row">
      <div class="filter-label">ROLE</div>
      <div class="filter-pills" id="roleFilters">
        <button class="pill active" data-group="role" data-value="all">All</button>
        <button class="pill" data-group="role" data-value="Photographer">Photographer</button>
        <button class="pill" data-group="role" data-value="Director">Director</button>
        <button class="pill" data-group="role" data-value="Colorist">Colorist</button>
        <button class="pill" data-group="role" data-value="Motion Graphic">Motion Graphic</button>
        <button class="pill" data-group="role" data-value="Videographer">Videographer</button>
      </div>
    </div>
    <div class="filter-row">
      <div class="filter-label">TYPE</div>
      <div class="filter-pills" id="typeFilters">
        <button class="pill active" data-group="type" data-value="all">All</button>
        <button class="pill" data-group="type" data-value="Product Photography">Product Photography</button>
        <button class="pill" data-group="type" data-value="Music Video">Music Video</button>
        <button class="pill" data-group="type" data-value="Video Motion">Video Motion</button>
        <button class="pill" data-group="type" data-value="Lifestyle Photography">Lifestyle Photography</button>
        <button class="pill" data-group="type" data-value="GIF">GIF</button>
      </div>
    </div>
  </div>

  <div class="grid-container" id="grid"></div>

  <div class="modal" id="projectModal">
    <span class="modal-close" onclick="closeModal()">&times;</span>
    <div class="modal-content" id="modalContent"></div>
  </div>

  <section class="contact-footer" id="contact">
    <h2>GET IN TOUCH</h2>
    <div class="contact-links">
      <a href="mailto:witsanu.047@gmail.com" class="contact-item"><span>EMAIL</span>witsanu.047@gmail.com</a>
      <a href="https://www.instagram.com/wp.047/?hl=th" target="_blank" class="contact-item"><span>INSTAGRAM</span>@wp.047</a>
    </div>
  </section>

  <script>
    const projects = [
      { id: 1, title: "HAAB 2025 Wrapped Collection", roles: ["Photographer"], type: "Product Photography", folder: "HAAB-2025-wrapped-collection", totalImages: 4 },
      { id: 2, title: "HAAB x Meovv", roles: ["Photographer"], type: "Product Photography", folder: "HAAB-Meovv", totalImages: 4 },
      { id: 3, title: "CALLADAY - Meant to Be", roles: ["Director", "Colorist"], type: "Music Video", youtubeID: "J3WRBmX2RV0" }, // ใส่คอมม่าปิดท้ายงานเดิม
      { id: 4, title: "Layers x Chatramue", roles: ["Photographer"], type: "Product Photography", folder: "Layers-Chatramue", totalImages: 4},
      { id: 5, title: "HAROY - Hatyai Fried Chicken Wrap", roles: ["Motion Graphic"], type: "Video Motion", youtubeID: "czs6PBUbqpo" },
      { id: 6, title: "HATCH - The Magic Moment", roles: ["Photographer"], type: "Product Photography", folder: "HATCH - The Magic Moment", totalImages: 5},
      { id: 7, title: "HATCH - The Magic Moment Lifestyle", roles: ["Photographer"], type: "Lifestyle Photography", folder: "HATCH - The Magic Moment Lifestyle", totalImages: 4},
      { id: 8, title: "HAROY - Hatyai Fried Chicken Wrap with Northern Thai Green Chilli Dip", roles: ["Motion Graphic"], type: "Video Motion", youtubeID: "er7B83fACP8" },
      { id: 9, title: "HAROY - Hero QSR", roles: ["Motion Graphic"], type: "Video Motion", youtubeID: "oZRjo-die4A" },
      { id: 10, title: "HATCH - Something Sparkling is coming", roles: ["Photographer"], type: "GIF", youtubeID: "m07rylq95tc" },
      { id: 11, title: "HATCH - The Magic Moment", roles: ["Photographer"], type: "GIF", youtubeID: "PTJlRkRsZWI" },
      { id: 12, title: "CALLADAY – Last Christmas (Wham! Cover)", roles: ["Colorist"], type: "Music Video", youtubeID: "SXWTrgumPeM" },
      { id: 13, title: "CALLADAY – Easy (Mac Ayres Cover)", roles: ["Videographer", "Colorist"], type: "Music Video", youtubeID: "bOuCVLOgPtg" }
      
    ];

    let sRole = ["all"], sType = ["all"];

    function renderCards() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      projects.sort(() => Math.random() - 0.5);
      projects.forEach(p => {
        const card = document.createElement('div');
        card.className = `card ${p.youtubeID ? 'is-video' : ''}`;
        card.setAttribute('data-roles', p.roles.join(','));
        card.setAttribute('data-type', p.type);
        card.onclick = () => openProject(p);
        const cover = p.youtubeID ? `https://img.youtube.com/vi/${p.youtubeID}/maxresdefault.jpg` : `images/${p.folder}/01.jpg`;
        card.innerHTML = `<div class="card-thumb"><img src="${cover}" onerror="this.src='https://img.youtube.com/vi/${p.youtubeID}/hqdefault.jpg'"></div>
          <div class="card-body"><div class="card-title">${p.title}</div>
          <div>${p.roles.map(r => `<span class="tag">${r}</span>`).join('')}<span class="tag">${p.type}</span></div></div>`;
        grid.appendChild(card);
      });
      update();
    }

    function handlePill(pill) {
      const { group, value } = pill.dataset;
      let target = group === 'role' ? sRole : sType;
      if (value === 'all') target.splice(0, target.length, 'all');
      else {
        if (target.includes('all')) target.splice(target.indexOf('all'), 1);
        target.includes(value) ? target.splice(target.indexOf(value), 1) : target.push(value);
        if (target.length === 0) target.push('all');
      }
      document.querySelectorAll(`.pill[data-group="${group}"]`).forEach(p => p.classList.toggle('active', target.includes(p.dataset.value)));
      update();
    }

    function update() {
      const cards = document.querySelectorAll('.card');
      let count = 0;
      cards.forEach(c => {
        const rMatch = sRole.includes('all') || c.dataset.roles.split(',').some(r => sRole.includes(r));
        const tMatch = sType.includes('all') || sType.includes(c.dataset.type);
        const isVisible = rMatch && tMatch;
        c.style.display = isVisible ? 'flex' : 'none';
        if (isVisible) count++;
      });
      document.getElementById('visibleCount').textContent = count;
    }

    function openProject(p) {
      const modal = document.getElementById('projectModal'), content = document.getElementById('modalContent');
      content.innerHTML = p.youtubeID ? `<div class="video-container"><iframe src="https://www.youtube.com/embed/${p.youtubeID}?autoplay=1" allowfullscreen></iframe></div>` : 
        Array.from({length: p.totalImages}, (_, i) => `<img src="images/${p.folder}/${(i+1).toString().padStart(2, '0')}.jpg">`).join('');
      modal.style.display = 'flex';
      setTimeout(() => modal.classList.add('active'), 10);
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      const modal = document.getElementById('projectModal');
      modal.classList.remove('active');
      setTimeout(() => { modal.style.display = 'none'; document.getElementById('modalContent').innerHTML = ''; }, 300);
      document.body.style.overflow = 'auto';
    }

    document.querySelectorAll('.pill').forEach(p => p.onclick = () => handlePill(p));
    window.onload = renderCards;
  </script>
</body>
</html>
