<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wp.047 — Creative Portfolio</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500&family=Space+Mono:wght@400&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #242424;
      --border: #424242;
      --text: #f0ede8;
      --muted: #666;
      --accent: #e8d5b0;
      --speed: 0.3s;
      
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }

    /* ── HEADER ── */
    header {
      position: sticky; top: 0; z-index: 100; height: 60px; padding: 0 32px;
      background: rgba(10,10,10,0.85); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 3px; color: var(--accent); text-decoration: none; }
    
    nav { display: flex; align-items: center; gap: 24px; }
    nav a { color: var(--accent); text-decoration: none; font-size: 14px; letter-spacing: 1px; text-transform: uppercase; transition: var(--speed); }
    nav a:hover { color: var(--text); }

    /* แก้ไขข้อ 4: ปุ่มเมนูเฉพาะบนโทรศัพท์ */
    .menu-toggle { 
      display: none; 
      font-size: 24px; 
      cursor: pointer; 
      color: var(--text);
    }

    /* ── FILTER SECTION ── */
    .filter-section { padding: 24px 32px 12px; position: sticky; top: 60px; z-index: 90; background: var(--bg); border-bottom: 1px solid var(--border); }
    .filter-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .filter-label { font-family: 'Bebas Neue', sans-serif; font-size: 14px; color: var(--accent); min-width: 60px; }
    .pill { padding: 6px 14px; border-radius: 4px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 11px; cursor: pointer; transition: all var(--speed); text-transform: uppercase; }
    .pill.active { background: var(--text); color: #000; border-color: var(--text); }

    /* ── GRID ── */
    .grid-container { 
  padding: 32px; 
  display: flex;        /* เปลี่ยนเป็น Flex */
  align-items: flex-start; 
  gap: 24px;            /* ระยะห่างระหว่างคอลัมน์ */
}

    .grid-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 24px;            /* ระยะห่างระหว่างการ์ดในแนวตั้ง */
}

    .card { 
      background: var(--surface); 
      border-radius: 12px; 
      overflow: hidden; 
      cursor: pointer; 
      transition: all var(--speed);
      display: inline-block; 
      width: 100%; 
      margin-bottom: 0px; 
      break-inside: avoid; 
    }
    .card:hover { opacity: 0.8; }

    /* แก้ไขข้อ 3: Video Preview Effect */
    .card.is-video:hover {
      transform: scale(1.02);
      box-shadow: 0 10px 20px rgba(0,0,0,0.5);
    }
    .card.is-video:hover img {
      filter: brightness(1.2);
    }

    .card-thumb { width: 100%; aspect-ratio: 3/4; overflow: hidden; background: #151515; position: relative;}
    .card-thumb::after {content: ""; position: absolute; top: 0; left: -150%; width: 150%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent); 
    animation: shimmer 1.5s infinite;
}

@keyframes cardAppear {
  from { 
    opacity: 0; 
    transform: translateY(10px); /* ลอยขึ้นมานิดเดียวพอครับ */
  }
  to { 
    opacity: 1; 
    transform: translateY(0); 
  }
}

.card {
  /* ... โค้ดเดิมของคุณ ... */
  
  /* ปรับเวลาให้นานขึ้นเล็กน้อย (เช่น 0.8s) เพื่อความนุ่ม */
  animation: cardAppear 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  opacity: 0; 
}
    .card.is-video .card-thumb { aspect-ratio: 16/9; } 
    .card-thumb img { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.5s ease; position: relative; z-index: 1; }
    .card-body { padding: 20px; }
    .card-title { font-size: 15px; font-weight: 500; margin-bottom: 12px; }
    .tag { font-size: 9px; padding: 3px 8px; border-radius: 4px; background: var(--bg); color: var(--text); text-transform: uppercase; margin-right: 6px; }

    /* --- ประมาณบรรทัดที่ 90: เพิ่มส่วนนี้เข้าไปใหม่ --- */
.card-body div {
  display: flex;
  flex-wrap: wrap;    /* สั่งให้ขึ้นบรรทัดใหม่ได้ทุกขนาดหน้าจอ */
  gap: 6px 4px;       /* ระยะห่าง บน-ล่าง และ ซ้าย-ขวา */
  margin-top: 4px;
}
/* --- ประมาณบรรทัดที่ 96: แก้ไข .tag ของเดิม --- */
.tag { 
  font-size: 9px; 
  padding: 3px 8px; 
  border-radius: 4px; 
  background: var(--bg); 
  color: var(--text); 
  text-transform: uppercase; 
  
  margin-right: 0;      /* เปลี่ยนจาก 6px เป็น 0 เพราะเราใช้ gap แทนแล้ว */
  white-space: nowrap;  /* ป้องกันไม่ให้ตัวหนังสือใน Tag เดียวกันแยกบรรทัดกัน */
}
    /* ── MODAL ── */
    .modal { 
  position: fixed; 
  inset: 0; 
  background: rgba(0, 0, 0, 0); /* เริ่มจากโปร่งใส */
  backdrop-filter: blur(0px);   /* เริ่มจากไม่เบลอ */
  z-index: 1000; 
  display: none; 
  justify-content: center; 
  padding: 60px 20px; 
  transition: background 0.5s ease, backdrop-filter 0.5s ease; /* เพิ่ม Transition ตรงนี้ */
}

    .modal-body {
  width: 100%;
  height: 100%;
  overflow-y: auto; /* ให้เลื่อนเฉพาะส่วนนี้ */
  padding: 60px 20px; /* ย้าย Padding มาไว้ตรงนี้แทน */
  display: flex;
  flex-direction: column;
  align-items: center;
}
    
/* เมื่อ Modal ทำงาน (Active) */
    .modal.active { 
  display: flex; 
  background: rgba(0, 0, 0, 0.95); /* พื้นหลังค่อยๆ ดำ */
  backdrop-filter: blur(15px);    /* ฉากหลังค่อยๆ เบลอ */
}

        /* แก้ไขให้เหลือแค่กากบาทสีขาว นิ่งๆ */
.modal-close { 
  position: fixed; 
  top: 20px; 
  right: 30px; 
  
  /* ลบพื้นหลังและวงกลมออก */
  background: none; 
  backdrop-filter: none;
  border: none;
  border-radius: 0;
  width: auto;
  height: auto;

  /* สไตล์ของตัว X */
  font-size: 45px;      /* ขนาดใหญ่สะใจตามโค้ดดั้งเดิมของคุณ */
  color: #ffffff;      /* สีขาวล้วน */
  font-family: Arial, sans-serif; 
  line-height: 1;
  cursor: pointer; 
  
  /* ลำดับชั้นสูงที่สุด */
  z-index: 999999; 
  
  /* ลบ Motion ทั้งหมด */
  transition: opacity 0.3s ease; /* เหลือแค่การจางเข้า-ออกเบาๆ เวลาเอาเมาส์วาง */
}

/* ตอนเอาเมาส์วาง ให้แค่จางลงนิดเดียวพอครับ (UX Feedback) */
.modal-close:hover {
  opacity: 0.6;
  transform: none; /* มั่นใจว่าไม่มีการขยับ */
  background: none;
  color: #ffffff;
}

/* ปรับตำแหน่งบนมือถือ */
@media (max-width: 768px) {
  .modal-close {
    top: 15px;
    right: 20px;
    font-size: 40px;
  }
}

    /* แก้ไขข้อ 2: ขยายขนาดวิดีโอ */
    .modal-content { width: 100%; max-width: 1500px; display: flex; flex-direction: column; gap: 15px; height: fit-content; margin: auto; align-items: center; opacity: 0; 
  transform: scale(0.95) translateY(20px); /* เริ่มจากตัวเล็กและจมลงนิดนึง */
  transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.2, 1, 0.3, 1); }

    .modal.active .modal-content { 
  opacity: 1; 
  transform: scale(1) translateY(0); 
}
    

        /* แก้ไขขนาดรูปใน Modal ไม่ให้ใหญ่เกินจอ และเพิ่มความนุ่มนวล */
    .modal-content img {
        width: auto;
        max-width: 90%;       /* ไม่ให้ชนขอบซ้ายขวา */
        max-height: 80vh;     /* ⚡️ จำกัดความสูงไม่ให้เกิน 80% ของความสูงจอ */
        object-fit: contain;  /* ให้รูปคงสัดส่วนเดิม */
        border-radius: 8px;
        display: block;
        margin: 0 auto 20px;
        
        /* ระบบ Fade-in เมื่อโหลดเสร็จ */
        opacity: 0;
        transform: translateY(10px);
        transition: opacity 0.8s ease, transform 0.8s ease;
        will-change: opacity, transform;
    }

    /* เมื่อโหลดเสร็จให้จางเข้า */
    .modal-content img.loaded {
        opacity: 1;
        transform: translateY(0);
    }
    
    /* --- (Optional) เพิ่มแสงวิ่ง Shimmer ระหว่างรอรูป --- */
    /* เพื่อให้คนดูรู้ว่ากำลังโหลด ไม่ใช่ช่องว่างดำๆ */
    .modal-content img {
      background: #1a1a1a; /* สีพื้นหลังระหว่างรอ */
      position: relative;
      overflow: hidden;
    }
    
    /* เพิ่มแสงวิ่ง Shimmer สำหรับ Card */
    @keyframes shimmer {
        0% { left: -150%; }
        100% { left: 150%; }
    }
    
    /* แก้ไข .card-thumb ให้แสงวิ่งทำงานได้ */
    .card-thumb::after {
        content: "";
        position: absolute;
        top: 0;
        left: -150%;
        width: 150%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
        animation: shimmer 1.5s infinite;
    }
    
    .modal-content img:not(.loaded)::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        90deg, 
        transparent, 
        rgba(255, 255, 255, 0.03), 
        transparent
      );
      animation: modalShimmer 2s infinite;
    }
    .video-container { position: relative; width: 95%; max-width: 70vw; margin:0 auto; padding-bottom: 56.25%; background: #000; border-radius: 8px; overflow: hidden; }
    .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

    /* ── CONTACT ── */
    .contact-footer { padding: 120px 32px; text-align: center; border-top: 1px solid var(--border); }
    .contact-footer h2 { font-family: 'Bebas Neue', sans-serif; font-size: 40px; letter-spacing: 5px; margin-bottom: 30px; color: var(--accent); }
    .contact-links { display: flex; justify-content: center; gap: 40px; flex-wrap: wrap; }
    .contact-item { color: var(--text); text-decoration: none; font-size: 12px; }
    .contact-item span { color: var(--muted); display: block; font-size: 8px; margin-bottom: 4px; letter-spacing: 2px; }

    /* แก้ไขข้อ 4 & 5: Mobile UI */
    @media (max-width: 768px) {
      /* 1. เพิ่มส่วนนี้เพื่อควบคุมกลุ่มของ Tag ทั้งหมด */
.card-body div {
  display: flex;
  flex-wrap: wrap;    /* ยอมให้ Tag ขึ้นบรรทัดใหม่ได้ทุกขนาดจอ */
  gap: 6px 4px;       /* เว้นระยะห่าง บน-ล่าง และ ซ้าย-ขวา */
  margin-top: 4px;    /* เพิ่มระยะห่างจากชื่อโปรเจกต์เล็กน้อย */
}

.card-title {
    font-size: 13px;       /* ลดจาก 15px เหลือ 13px */
    margin-bottom: 8px;    /* ลดระยะห่างด้านล่างลงนิดนึงให้ดูกระชับ */
    line-height: 1.3;      /* ปรับระยะบรรทัดให้พอดี */
}
      
/* 2. แก้ไขคลาส .tag เดิมของคุณ */
.tag { 
  font-size: 8px; 
  padding: 2px 6px;
  letter-spacing: 0.5px;
  border-radius: 4px;  
  text-transform: uppercase; 
  
  /* แก้ไขจุดนี้: */
  display: inline-block;
  margin-right: 0;      /* เปลี่ยนจาก 6px เป็น 0 เพราะเราใช้ gap คุมแทนแล้ว */
  white-space: nowrap;  /* ป้องกันไม่ให้ตัวหนังสือ "ใน Tag เดียวกัน" แยกบรรทัดกัน */
}
      /* 1. ปรับระยะห่างระหว่าง "แถว" (Role กับ Type) */
  .filter-row {
    margin-bottom: 24px; /* เพิ่มระยะห่างระหว่างแถว Role และ Type */
    flex-direction: column; /* ให้หัวข้อ Role/Type อยู่บนปุ่ม (เลือกใส่หรือไม่ก็ได้ครับ) */
    align-items: flex-start;
    gap: 8px;
  }

  /* 2. ปรับระยะห่างระหว่าง "บรรทัด" ของปุ่ม (กรณีปุ่มยาวจนตัดขึ้นบรรทัดใหม่) */
  .filter-pills {
    display: flex;
    flex-wrap: wrap; /* ให้ปุ่มไหลลงมาบรรทัดใหม่ได้ */
    gap: 10px 8px;   /* เลขตัวแรกคือระยะห่าง "บน-ล่าง" (Vertical Gap) */
  }

  /* ปรับขนาดปุ่มให้ใหญ่ขึ้นนิดนึงเพื่อให้กดด้วยนิ้วง่ายขึ้น (Optional) */
  .pill {
    padding: 8px 16px;
    font-size: 11px;
  }
  /* 1. จัดตำแหน่ง Header ใหม่ */
  header {
    position: relative; 
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 20px;
  }

  /* 2. บังคับ Logo ให้อยู่กึ่งกลางหน้าจอพอดี */
  .logo {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    font-size: 20px; /* ย่อขนาดลงนิดนึงให้พอดีกับมือถือ */
  }

  /* 3. สลับฝั่งให้ ☰ ไปซ้าย และ Contact ไปขวา */
  nav {
    width: 100%;
    display: flex !important;
    flex-direction: row-reverse; /* สลับตำแหน่งลูกใน nav */
    justify-content: space-between;
    align-items: center;
    gap: 0;
  }

  /* ปรับระยะห่าง Contact นิดนึง */
  nav a {
    font-size: 10px;
  }

  /* --- ส่วนของมือถือ (Mobile UI) --- */
@media (max-width: 768px) {

  .filter-section { 
    /* เปลี่ยนจาก display: none เป็นระบบซ่อนแบบนุ่มนวล */
    display: block;           /* เปิดไว้ตลอดแต่ซ่อนด้วยวิธีอื่น */
    position: absolute; 
    top: 60px; 
    left: 0; 
    width: 100%;
    background: rgba(10, 10, 10, 0.98); /* เพิ่มความโปร่งแสงนิดๆ ให้ดูแพง */
    backdrop-filter: blur(15px);        /* เบลอหลังเมนู */
    padding: 20px; 
    z-index: 95; 
    border-bottom: 1px solid var(--border);

    /* ⚡️ หัวใจสำคัญ: สถานะเริ่มต้น (ซ่อน) */
    opacity: 0;
    visibility: hidden;
    transform: translateY(-20px);       /* ให้ลอยขึ้นไปรอข้างบน */
    transition: 
        opacity 0.4s ease, 
        transform 0.4s cubic-bezier(0.2, 1, 0.3, 1), 
        visibility 0.4s;
  }

  /* ⚡️ เมื่อกดปุ่มเมนู (แสดง) */
  .filter-section.show { 
    opacity: 1;
    visibility: visible;
    transform: translateY(0);          /* สไลด์ลงมาตำแหน่งปกติ */
  }

  /* เพิ่มลูกเล่นให้ปุ่มเมนู ☰ หมุนตอนกด */
  .menu-toggle {
    display: block;
    transition: transform 0.3s ease;
  }
  
  /* ถ้าอยากให้ปุ่มหมุนเมื่อเปิดเมนู (ต้องแก้ JS นิดหน่อย หรือใช้ CSS เช็ก) */
}

  /* 5. การจัดเรียง Card (คงเดิม) */
  .grid-container { 
    display: flex;      /* ย้ำว่าเป็น flex */
    padding: 16px; 
    gap: 16px;          /* ระยะห่างซ้าย-ขวา ในมือถือ */
  }

  /* เพิ่มคลาสนี้ในส่วนมือถือด้วย */
  .grid-col {
    gap: 16px;          /* ระยะห่างบน-ล่าง ในมือถือ */
  }

  /* ลบบรรทัด columns: 2; และ column-gap: 16px; เดิมออกได้เลยครับ */
}
  </style>
</head>

  <header>

    <nav>

<div class="modal" id="projectModal">

</div>

  </section>

  <script>
    /* --- ประกาศตัวแปรย่อ --- */
    const pt = "Photographer", dr = "Director", cl = "Colorist", 
          mg = "Motion Graphic", vg = "Videographer", ad = "Assistant Director", ed = "Editor";
    const pp = "Product Photography", mv = "Music Video", vm = "Video Motion", 
          lp = "Lifestyle Photography", ls = "Live Session", gf = "GIF", 
          ads = "Ads", wd = "Wedding", iw = "Interview";

    const projects = [

      { id: 2, title: "HAAB x Meovv", roles: [pt], type: pp, folder: "HAAB-Meovv", totalImages: 4 },
      { id: 3, title: "CALLADAY - Meant to Be", roles: [dr, cl], type: mv, youtubeID: "J3WRBmX2RV0" },
      { id: 4, title: "Layers x Chatramue", roles: [pt], type: pp, folder: "Layers-Chatramue", totalImages: 4},
      { id: 5, title: "HAROY - Hatyai Fried Chicken Wrap", roles: [mg], type: vm, youtubeID: "czs6PBUbqpo" },
      { id: 6, title: "HATCH - The Magic Moment", roles: [pt], type: pp, folder: "HATCH - The Magic Moment", totalImages: 5},
      { id: 7, title: "HATCH - The Magic Moment Lifestyle", roles: [pt], type: lp, folder: "HATCH - The Magic Moment Lifestyle", totalImages: 4},
      { id: 8, title: "HAROY - Hatyai Fried Chicken Wrap with Northern Thai Green Chilli Dip", roles: [mg], type: vm, youtubeID: "er7B83fACP8" },
      { id: 9, title: "HAROY - Hero QSR", roles: [mg], type: vm, youtubeID: "oZRjo-die4A" },
      { id: 10, title: "HATCH - Something Sparkling is coming", roles: [pt], type: gf, youtubeID: "m07rylq95tc" },
      { id: 11, title: "HATCH - The Magic Moment", roles: [pt], type: gf, youtubeID: "PTJlRkRsZWI" },
      { id: 12, title: "CALLADAY – Last Christmas (Wham! Cover)", roles: [cl], type: mv, youtubeID: "SXWTrgumPeM" },
      { id: 13, title: "CALLADAY – Easy (Mac Ayres Cover)", roles: [vg, cl], type: ls, youtubeID: "bOuCVLOgPtg" },
      { id: 14, title: "Your Smile (รอยยิ้มของเธอ) - HAAB | Official Music Video", roles: [ad, ed, cl], type: mv, youtubeID: "CexA0QFFivI" },
      { id: 15, title: "YogurBara x Serious Bacon (Live Session)", roles: [vg, cl], type: ls, youtubeID: "4V7m_1cQirg" },
      { id: 16, title: "YogurBara - Omma’s Special Giftbox", roles: [ad, ed, cl], type: ads, youtubeID: "pvxOjIWyOIU" },
      { id: 17, title: "YogurBara - BabyCake", roles: [pt], type: pp, folder: "YogurBara - BabyCake", totalImages: 4},
      { id: 18, title: "YogurBara - Mayongchid", roles: [pt], type: pp, folder: "YogurBara - Mayongchid", totalImages: 4},

      { id: 20, title: "HAROY - Hatyai Fried Chicken Rice", roles: [pt], type: pp, folder: "HAROY - Hatyai Fried Chicken Rice", totalImages: 4},

      { id: 29, title: "Kung Fu Panda 4", roles: [vg], type: iw, youtubeIDs: ["OEnzHdAcwiU", "R9EGSIltaN0", "ivdtyfsbdJ4", "0LijMmepLdI"] },

    ];

    let sRole = ["all"], sType = ["all"];

    projects.sort(() => Math.random() - 0.5);
    
    function renderCards() {
        const grid = document.getElementById('grid');
        if (!grid) return;
        grid.innerHTML = '';
        
        const colCount = window.innerWidth <= 768 ? 2 : 4;
        const colElements = [];

        for (let i = 0; i < colCount; i++) {
            const col = document.createElement('div');
            col.className = 'grid-col';
            grid.appendChild(col);
            colElements.push(col);
        }

        const filteredProjects = projects.filter(p => {
            const rMatch = sRole.includes('all') || p.roles.some(r => sRole.includes(r));
            const tMatch = sType.includes('all') || sType.includes(p.type);
            return rMatch && tMatch;
        });

        filteredProjects.forEach((p, index) => {
            const card = document.createElement('div');
            const isVideo = !!(p.youtubeID || (p.youtubeIDs && p.youtubeIDs.length > 0));
            card.className = `card ${isVideo ? 'is-video' : ''}`;
            card.onclick = () => openProject(p);
            
            // ตรรกะหาหน้าปก Card: ใช้รูปจาก Folder ก่อน ถ้าไม่มีให้ดึงจาก Video ตัวแรก
            let coverImg = "";
            let firstVideoID = p.youtubeID || (p.youtubeIDs ? p.youtubeIDs[0] : "");

            if (p.folder) {
                coverImg = `images/${p.folder}/01.jpg`;
            } else if (firstVideoID) {
                coverImg = `https://img.youtube.com/vi/${firstVideoID}/maxresdefault.jpg`;
            }

            card.innerHTML = `
                <div class="card-thumb">
                    <img src="${coverImg}" loading="lazy" decoding="async" 
                         onerror="if(this.src.includes('maxres')) this.src='https://img.youtube.com/vi/${firstVideoID}/hqdefault.jpg'">
                </div>
                <div class="card-body">
                    <div class="card-title">${p.title}</div>
                    <div>
                        ${p.roles.map(r => `<span class="tag">${r}</span>`).join('')}
                        <span class="tag">${p.type}</span>
                    </div>
                </div>`;
            colElements[index % colCount].appendChild(card);
        });
    }

    function openProject(p) {
        const modal = document.getElementById('projectModal'), 
              content = document.getElementById('modalContent');
        if (!modal || !content) return;
        content.innerHTML = ''; 

        // 1. ถ้ามีวิดีโอหลายตัว (youtubeIDs)
        if (p.youtubeIDs && p.youtubeIDs.length > 0) {
            p.youtubeIDs.forEach(id => {
                content.innerHTML += `
                    <div class="video-container" style="margin-bottom: 25px;">
                        <iframe src="https://www.youtube.com/embed/${id}?modestbranding=1&rel=0" allowfullscreen></iframe>
                    </div>`;
            });
        } 
        // 2. ถ้ามีวิดีโอเดี่ยว (youtubeID)
        else if (p.youtubeID) {
            content.innerHTML += `
                <div class="video-container" style="margin-bottom: 25px;">
                    <iframe src="https://www.youtube.com/embed/${p.youtubeID}?autoplay=1&modestbranding=1&rel=0" allowfullscreen allow="autoplay"></iframe>
                </div>`;
        }

        // 3. ถ้ามีรูปภาพใน Folder (โหลดต่อนุ่มๆ)
        if (p.folder && p.totalImages) {
            Array.from({length: p.totalImages}, (_, i) => {
                const imgPath = `images/${p.folder}/${(i+1).toString().padStart(2, '0')}.jpg`;
                const imgElement = document.createElement('img');
                imgElement.src = imgPath;
                imgElement.onload = function() { this.classList.add('loaded'); };
                imgElement.onerror = function() { this.style.display = 'none'; };
                content.appendChild(imgElement);
            });
        }

        modal.style.display = 'flex';
        setTimeout(() => modal.classList.add('active'), 10);
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        const modal = document.getElementById('projectModal');
        const closeBtn = document.querySelector('.modal-close');
        
        // ปุ่ม X หายทันที
        if (closeBtn) closeBtn.style.display = 'none'; 
        
        modal.classList.remove('active');
        setTimeout(() => { 
            modal.style.display = 'none'; 
            document.getElementById('modalContent').innerHTML = '';
            if (closeBtn) closeBtn.style.display = 'block'; 
            const modalBody = document.querySelector('.modal-body');
            if(modalBody) modalBody.scrollTop = 0;
        }, 500);
        document.body.style.overflow = 'auto';
    }

    function handlePill(pill) {
        const { group, value } = pill.dataset;
        let target = group === 'role' ? sRole : sType;
        if (value === 'all') target.splice(0, target.length, 'all');
        else {
            if (target.includes('all')) target.splice(target.indexOf('all'), 1);
            if (target.includes(value)) target.splice(target.indexOf(value), 1);
            else target.push(value);
            if (target.length === 0) target.push('all');
        }
        document.querySelectorAll(`.pill[data-group="${group}"]`).forEach(p => p.classList.toggle('active', target.includes(p.dataset.value)));
        renderCards();
        if (window.innerWidth <= 768 && document.getElementById('filterSection').classList.contains('show')) toggleFilters();
    }

    function toggleFilters() {
        const filter = document.getElementById('filterSection');
        const menuBtn = document.querySelector('.menu-toggle');
        if (!filter || !menuBtn) return;
        filter.classList.toggle('show');
        menuBtn.innerHTML = filter.classList.contains('show') ? '&times;' : '☰';
    }

    // สร้างตัวแปรเก็บความกว้างหน้าจอตอนแรกไว้
let lastWidth = window.innerWidth;

window.onresize = () => {
    // ถ้าความกว้างปัจจุบัน ไม่เท่ากับ ความกว้างล่าสุด (เช่น หมุนจอ หรือย่อบราวเซอร์)
    if (window.innerWidth !== lastWidth) {
        renderCards();             // ให้วาดการ์ดใหม่
        lastWidth = window.innerWidth; // อัปเดตค่าความกว้างล่าสุดเก็บไว้
    }
    // ถ้าความกว้างเท่าเดิม (เช่น เลื่อนหน้าจอมือถือแล้วแถบ Address Bar ยุบ) จะไม่ทำอะไรเลย
};
    document.querySelectorAll('.pill').forEach(p => p.onclick = () => handlePill(p));
    window.onload = renderCards;
</script>
